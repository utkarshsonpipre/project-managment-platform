services:
  postgres:
    image: postgres:16-alpine
    container_name: pmp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: pmp
      POSTGRES_PASSWORD: pmp_password
      POSTGRES_DB: pmp
    ports:
      - "5432:5432"
    volumes:
      - pmp-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pmp -d pmp"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: pmp-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - pmp-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: pmp-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console
    volumes:
      - pmp-minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  # One-shot job: create the attachments bucket on startup
  minio-setup:
    image: minio/mc:latest
    container_name: pmp-minio-setup
    depends_on:
      minio:
        condition: service_started
    entrypoint: >
      /bin/sh -c "
      until (mc alias set local http://minio:9000 minioadmin minioadmin) do echo 'waiting for minio...' && sleep 2; done;
      mc mb --ignore-existing local/pmp-attachments;
      mc anonymous set download local/pmp-attachments;
      echo 'MinIO bucket ready.';
      exit 0;
      "

volumes:
  pmp-postgres-data:
  pmp-redis-data:
  pmp-minio-data:

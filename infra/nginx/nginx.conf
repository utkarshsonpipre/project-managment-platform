worker_processes auto;

events {
  worker_connections 1024;
}

http {
  upstream web {
    server web:3000;
  }
  upstream realtime {
    server realtime:4001;
  }

  # Trust the docker network for X-Forwarded headers.
  map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
  }

  server {
    listen 80;
    server_name _;

    client_max_body_size 25m;

    # WebSocket / Socket.IO traffic to the realtime service.
    location /socket.io/ {
      proxy_pass http://realtime;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_read_timeout 3600s;
    }

    # Metrics are internal-only; block external scrapes at the edge.
    location = /api/metrics {
      allow 10.0.0.0/8;
      allow 172.16.0.0/12;
      allow 192.168.0.0/16;
      deny all;
      proxy_pass http://web;
      proxy_set_header Host $host;
    }

    # Everything else → Next.js app.
    location / {
      proxy_pass http://web;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}
